name: portfolio-watchdog
# Checks that the portfolio dashboard (josh-max2.github.io/portfolio) is updating.
# The page's build timestamp (TS=...) is in the unencrypted shell, so no secrets
# are needed. If stale, opens a GitHub issue -> GitHub emails the owner. Closes
# the issue automatically on recovery.
on:
  schedule:
    - cron: "17 14-21/2 * * 1-5"   # every 2h during US market hours
  workflow_dispatch: {}
permissions:
  issues: write
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check dashboard freshness
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          NOW=$(date +%s)
          TS=$(curl -sf "https://josh-max2.github.io/portfolio/?cb=$NOW" \
               | grep -oE 'TS=[0-9]+' | head -1 | cut -d= -f2 || echo 0)
          AGE=$(( (NOW - TS) / 60 ))
          echo "dashboard build age: ${AGE} min"
          # market hours (13:30-22:00 UTC, Mon-Fri): expect a build every ~30 min.
          DOW=$(date -u +%u); HR=$(date -u +%H)
          THRESH=4320   # 3 days when market closed (weekend/overnight is normal)
          if [ "$DOW" -le 5 ] && [ "$HR" -ge 14 ] && [ "$HR" -lt 22 ]; then THRESH=120; fi
          OPEN=$(gh issue list -R ${{ github.repository }} --state open \
                 --label monitor-down --json number --jq 'length')
          if [ "$TS" = "0" ] || [ "$AGE" -gt "$THRESH" ]; then
            if [ "$OPEN" = "0" ]; then
              gh label create monitor-down -R ${{ github.repository }} \
                --color B60205 2>/dev/null || true
              gh issue create -R ${{ github.repository }} --label monitor-down \
                --title "🔴 Portfolio dashboard STALE (${AGE} min old)" \
                --body "https://josh-max2.github.io/portfolio/ has not rebuilt in **${AGE} minutes** (threshold ${THRESH}). Likely causes: the portfolio repo's scheduled workflow was auto-disabled (60-day rule — press *Run workflow* or push a commit), a workflow failure (check the Actions tab of josh-max2/portfolio), or Plaid/Yahoo outage. This issue closes itself when builds resume."
            fi
          else
            if [ "$OPEN" != "0" ]; then
              N=$(gh issue list -R ${{ github.repository }} --state open \
                  --label monitor-down --json number --jq '.[0].number')
              gh issue close -R ${{ github.repository }} "$N" \
                -c "Recovered — dashboard is ${AGE} min old."
            fi
          fi
      - name: Monthly keepalive (prevents 60-day cron auto-disable)
        if: ${{ always() }}
        run: |
          if [ "$(date +%d)" = "01" ] || [ ! -f .keepalive ]; then
            date > .keepalive
            git config user.email "watchdog@bot" && git config user.name "watchdog"
            git add .keepalive && git commit -m "keepalive" -q && git push -q || true
          fi
